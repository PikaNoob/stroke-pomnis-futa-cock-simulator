;############СИНТАКСИС############
################СВОЙСТВА ОБЪЕКТА################################################################################
;Свойство        Тип данных      Пр-е значения   По умолчанию    %z %a %r %c %n %b  Краткое описание
;name            строка          любой текст     Объект ##       -  -  -  -  -  -   Название объекта
;default         число           $0-$FF          $0              -  -  -  -  -  -   Значение подтипа по умолчанию
;canbereversed   число           0,1,2,3         0               -  -  -  -  -  -   Переворачивать объект?
;rememberstate   число           0 или 1         0               -  -  -  -  -  -   Состояние по умолчанию
;maps            имя файла       любое имя       -               -  -  -  -  -  -   Файл с маппингами
;repeatnum       выражение       $0-$FF          0               +  +  +  +  -  +   Количество отрисовок
;usetiles        выражение       $0-$FFE0        $0              +  +  +  +  +  +   Адрес первого тайла в видеопамяти
;usesprite       выражение       $0-$FF          $0              +  +  +  +  +  +   Номер спрайта для отрисовки
;usepalette      выражение       $0-$3           $0              +  +  +  +  +  +   Номер палитры
;priority        выражение       $0-$7           $3              +  +  +  +  +  +   Приоритет спрайта
;offsetx         выражение       -$8000-$7FFF    $0              +  +  +  +  +  +   Смещение по X
;offsety         выражение       -$8000-$7FFF    $0              +  +  +  +  +  +   Смещение по Y
;reversex        выражение       0 или 1         $0              +  +  +  +  +  +   Отражение по X
;reversey        выражение       0 или 1         $0              +  +  +  +  +  +   Отражение по Y
;brightness      выражение       -$80-$7F        $0              +  +  +  +  +  +   Яркость
;constants       К-выражение     -               -               -  -  -  -  -  -   Список подгружаемых констант
;bitfields       П-выражение     -               -               +  +  -  +  -  +   Параметр объекта

; ======== name ========
;Название объекта.
;Название объекта отображается при наведении на него курсора мыши.
;Если этот параметр не задать, именем по умолчанию будет "Объект ##", где ## - hex-номер объекта.

; ======== default ========
;Значение типа объекта по умолчанию.
;Значение этого параметра автоматически присваивается типу создаваемого объекта.
;Тип влияет на характеристики объекта.
;Например, объект $26 с типом $06 представляет из себя монитор с десятью кольцами внутри,
;а тот же с типом $02 - монитор с дополнительной жизнью.
;Внимание! Задание нуля по умолчанию не всегда оправдано.
;К примеру, объект $1C в GHZ (колышек моста) с типом $0 замкнёт игру.

; ======== canbereversed ========
;Как влияет на объект параметр "Отражение":
;0 - никак
;1 - спрайт отражается согласно значению параметра
;Дело в том, что некоторые объекты не способны зеркально отражаться по осям координат. Например, объект $3B (камень).
;Причина кроется в исходнике sonic1.asm, в функции, обычно связанной с инициализацией объекта,
;которая носит название Obj##_Main, где ## - hex-номер объекта
;В ней может иметься строчка "move.b #4,1(a0)", либо "ori.b #4,1(a0)".
; ori.b #4,1(a0) - оставляет отражение, установленное в редакторе; т.е. canbereversed = 1.
; move.b #4,1(a0) - затирает любое отражение, установленное в редакторе; т.е. canbereversed = 0.

; ======== rememberstate ========
;Вопрос: помнить состояние объекта? 1 - да, 0 - нет
;Значение этого параметра по умолчанию присваивается полю rememberstate создаваемого объекта

; ======== maps ========
;Подключаемый файл с маппингами, необходим для создания спрайтов объекта.
;синтаксис значения этого параметра описан в levels.cfg
;Возможно подключение нескольких (*до 8 включительно) файлов с маппингами
;Для этого после maps нужно поставить символ "_" и какой-нибудь набор символов, например:
; maps_main="имя файла 1" -a
; maps_else="имя файла 2" -a -t:$80
;Спрайты конструируются из тайлов, находящихся в видеопамяти.

; ======== repeatnum ========
;Массовая отрисовка объекта.
; если repeatnum не задано или равно 0, объект отрисовывается один раз.
; если repeatnum равно 1, объект отрисовывается два раза.
; если repeatnum равно 2, отрисовывается три раза и т.д.
;Значение большее 0 следует устанавливать в том случае, если объект состоит из нескольких частей, и нужно все их отрисовать.
;Например, объект $25 (кольца) могут состоять из двух, трёх, ..., восьми колец.
;Объект $31 состоит из четырёх элементов: держателя, цепи, плиты и шипов.
;Объект $78 (гусеница) состоит из четырёх частей: три из них составляют тело, одна часть - голову.

; ======== usetiles ========
;Адрес в видеопамяти, с которого начинаются тайлы объекта.
;Адрес должен быть кратен $20, в противном случае адрес автоматически округлится в меньшую сторону до кратности $20.

; ======== usesprite ========
;Номер спрайта в маппингах, который нужно отрисовать.
;Если файлов маппингов открыто несколько, и необходимо отрисовать, к примеру, третий спрайт второго файла маппинга,
;то его номер будет равен "адресу в памяти, по которому был залит файл второго маппинга, делённому на 2,
;плюс номер спрайта".
;Например:
; maps_main="имя файла 1" -a
; maps_else="имя файла 2" -a -t:$80
;Чтобы отрисовать третий спрайт из файла maps_else, usesprite должен принять вид "usesprite=$43".

; ======== usepalette ========
;Номер используемой палитры.
;Значение usepalette должно лежать в пределах от 0 до 3, в противном случае оно разделится на 4 и присвоит себе остаток.

; ======== offsetx, offsety ========
;Смещение объекта в горизонтальном и вертикальном направлениях.
;Необходимо для корректировки позиции объекта в соответствии с реальным положением дел,
;а также для задания смещений отдельным элементам объекта при массовой отрисовке.
;Примером первого случая может послужить объект $32 (кнопка), которая без корректировки в редакторе выглядит
;немного приподнятой. Исправляет это недоразумение значение offsety, равное 3.
;Второй случай встречается гораздо чаще. Например, таким способом задаётся расстояние между кольцами.

; ======== reversex, reversey ========
;Отражение объекта по горизонтали и вертикали. 1 - отражён, 0 - нет
;Необходимо для корректировки ориентации объекта в соответствии с реальным положением дел,
;а также для задания отражений отдельным элементам объекта при массовой отрисовке.

; ======== brightness ========
;Установка яркости изображения объекта.
;Меньше нуля - сделать темнее.
;Больше нуля - сделать светлее.
;По умолчанию - 0 - оставить без изменений.

; ======== constants ========
;Список подгружаемых констант.
;Необходим для уменьшения повторяемости чисел в выражениях.
;Каждому объекту выделяется место для 8 списков, каждый из которых может содержать до 32 констант.
;Подробнее о списках констант см. раздел "К-выражения".

; ======== bitfields ========
;Задание параметра объекта.
;Параметры задаются на основании выборки конкретных битов типа объекта.
;Каждому объекту выделяется место для 8 параметров, каждый из которых может содержать до 32 значений.
;Подробнее о параметрах см. раздел "П-выражения".

################ТИПЫ ДАННЫХ################################################################################
;Почти все свойства объекта (за исключением name и maps) описываются числом.

; ================ СТРОКА ================================================
;Строка - последовательность символов ASCII. Пример:
; Это строка
; "Это тоже строка"
; This is string
; 0123456789
; Платформа-маятник
; "" - пустая строка
;Если строка заключена с двух сторон кавычками, парсер удаляет их.

; ================ ИМЯ ФАЙЛА ================================================
;см. levels.cfg

; ================ ВЫРАЖЕНИЕ ================================================
;Под выражением подразумевается математическое выражение, составленное при помощи чисел, ключей и операторов.
;Парсер редактора анализирует выражение и находит его числовое (или строковое) значение.

; ================ ЧИСЛО ================================================
;Числа записываются в десятичной (dec) или шестнадцатиричной (hex) системе.
;Если в числе имеется недопустимый символ, парсер вернёт 0.
;Примеры:
;5 - вернёт 5
;$5 - вернёт 5
;10 - вернёт 10
;-10 - вернёт -10
;$10 - вернёт 16
;-$10 - вернёт -16
;$AB - вернёт 171
;Примеры-ошибки:
;Я7 - вернёт 0
;1К - вернёт 0
;$Ф3 - вернёт 0
;$CH - вернёт 0
;SONIC - вернёт 0

; ================ ОПЕРАТОРЫ ================================================
;Парсер понимает следующие математические операторы:
;+ - оператор сложения
; 5+2 - вернёт 7
;- - оператор вычитания
; 5-2 - вернёт 3
;* - оператор умножения
; 5*2 - вернёт 10
;/ - оператор деления. Результат округляется в меньшую сторону. Попытка поделить на ноль вернёт ноль.
; 6/2 - вернёт 3
; 5/2 - вернёт 2
; 5/0 - вернёт 0
;\ - остаток от деления
; 5\2 - вернёт 1
;Операторы умножения, деления и получения остатка имеют высокий приоритет, сложения и вычитания - низкий
; 2+2*2 - вернёт 6
; (2+2)*2 - вернёт 8
; 2+2/2 - вернёт 3
; (2+2)/2 - вернёт 2

; ================ ОПЕРАТОР УСЛОВИЯ ================================================
;[С:РПУ,В1:Р1,В2:Р2,В3:Р3,...] - оператор условной выборки
; С - Сравниваемое выражение
; РПУ - Возвращаемый результат по умолчанию (можно опустить)
; В1, В2, В3 - Варианты
; Р1, Р2, Р3 - Возвращаемый результат (можно опустить)
;С последовательно сравнивается с каждым из В (В1,В2,В3). Если совпадение найдено (т. е. С = В), возвращается Р, ;соответсвующее В, дальнейший поиск прерывается. Если совпадений не найдено, результат берётся из РПУ.
;Если Р или РПУ не указаны, возвращается ноль.
;Примеры:
; [2:0,1:10,2:20,3:30,4:40,5:50] - вернёт 20
; [3:0,1:10,2:20,3:30,3:40,3:50] - вернёт 30
; [4:22,1:10,2:20,3:30,4:40,5:50] - вернёт 40
; [5:50,1:10,2:20,3:30,4:40,5] - вернёт 0
; [6:0,1:10,2:20,3:30,4:40,5:50] - вернёт 0
; [7,1:10,2:20,3:30,4:40,5:50] - вернёт 0
; [8:88,1:10,2:20,3:30,4:40,5:50] - вернёт 88
; [$C,10:100,11:110,12:120,13:130,14:140] - вернёт 120 (т.к. $C = 12)
; [%z,0:11,1:22,2:33,3:44,4:55] - если текущая зона Marble Zone, вернёт 33
; [%z,0:"15ghz",2:"15ghz",3:"15slz",5:"15sbz"] - если текущая зона, к примеру, Star Light Zone, вернёт "15slz",
;  если Marble Zone - вернёт пустую строку.
; [5, 5:[1,0:0,1:8,2:9], 1:[7,7:3]]*[1, 0:[1,0:0,1:8,2:9], 1:[7,7:3]] вернёт 24

; ================ КЛЮЧИ ================================================
;Запись, начатая с символа %, называется ключом
;%z - Номер текущей зоны
; 0 - Green Hill Zone
; 1 - Labirint Zone
; 2 - Marble Zone
; 3 - Star Light Zone
; 4 - Spring Yard Zone
; 5 - Scrap Brain Zone
; 7 - Ending
;Если текущая зона, к примеру, Marble Zone, запись %z выведет число 2
;
;%a - Номер текущего акта
; 0 - первый акт
; 1 - второй акт
; 2 - третий акт
; 3 - четвёртый акт (третий акт Scrap Brain Zone - это четвёртый акт Labirint Zone)
;Если текущий акт, к примеру, второй, запись %a выведет число 1
;
;%b - возвращает значение, состоящее из выборки отдельных битов типа объекта.
; Номера битов, которые необходимо выбрать, перечисляются сразу же после записи ключевого слова %b.
; Рассмотрим на примере объекта $25 (кольца) с типом $52 ("три штуки, расположенные по вертикали с промежутками 8px").
; Hex-значение типа: $52 (в двоичной системе 01010010).
;
; Нумерация битов:
; Биты:  0 1 0 1 0 0 1 0
; Номер: 7 6 5 4 3 2 1 0
;
; запись %b0 вернёт значение $0 (00000000)
; запись %b1 вернёт значение $1 (00000001)
; запись %b2 вернёт значение $0 (00000000)
; запись %b3 вернёт значение $0 (00000000)
; запись %b4 вернёт значение $1 (00000001)
; запись %b5 вернёт значение $0 (00000000)
; запись %b6 вернёт значение $1 (00000001)
; запись %b7 вернёт значение $0 (00000000)
;
; запись %b01 вернёт значение $2 (00000010)
; запись %b012 вернёт значение $2 (00000010)
; запись %b0123 вернёт значение $2 (00000010)
; запись %b01234 вернёт значение $12 (00010010)
; запись %b012345 вернёт значение $12 (00010010)
; запись %b0123456 вернёт значение $52 (01010010)
; запись %b01234567 вернёт значение $52 (01010010)
; запись %b4567 вернёт значение $5 (00000101)
;
; запись %b76543210 вернёт значение $4A (01001010)
; запись %b146 вернёт значение $7 (00000111)
; запись %b02357 вернёт значение $0 (00000000)
; запись %b11111111 вернёт значение $FF (11111111)
; запись %b00000000 вернёт значение $0 (00000000)
;
;%rr - возвращает способ отражения объекта
; 0 - не отражён
; 1 - отражён по горионтали
; 2 - отражён по вертикали
; 3 - отражён и по горизонтали, и по вертикали
;%rx - возвращает 1, если объект отражён по горизонтали, в противном случае - 0
;%ry - возвращает 1, если объект отражён по вертикали, в противном случае - 0
;
;%n - показывает, какая по счёту копия объекта отрисовывается в данный момент
; Используется для отрисовки отдельных частей целого объекта.
; При отрисовке первого элемента значение %n равно 0.
; При отрисовке последнего элемента значение %n равно repeatnum.

; ================ К-ВЫРАЖЕНИЯ ================================================
;Выражение, описывающее список с константами. Имеет следующий вид:
; [#С:ЗПУ,Н1:З1,Н2:З2,Н3:З3,...]
; С - Номер списка констант
; ЗПУ - Возвращаемое значение по умолчанию (можно опустить)
; Н1, Н2, Н3 - Номера констант
; З1, З2, З3 - Значения констант (можно опустить)
; Каждый объект может иметь до 8 списков, каждый список может содержать до 32 пар константа-значение.
; Доступ к определённой константе определённого списка осуществляется при помощи ключа %c.

; ================ П-ВЫРАЖЕНИЯ ================================================
;Выражение, описывающее параметр объекта. Имеет следующий вид:
; [@Б:ОП,В1:О1,В2:02,В3:О3]
; Б - Ключ %b (выборка битов из байта типа объекта)
; ОП - Текстовое описание параметра (может содержать пустую строку - тогда параметр не будет отображён в редакторе).
; В1,В2,В3 - Варианты значений ключа %b
; О1,О2,О3 - Текстовое описание значений параметра (может содержать пустую строку - тогда при изменении параметра в редакторе
; это значение будет пропущено)
; Каждый объект может иметь до 8 параметров, каждый параметр может содержать до 32 значений.
