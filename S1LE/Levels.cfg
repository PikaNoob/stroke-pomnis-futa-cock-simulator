;############СИНТАКСИС############
###СВОЙСТВА УРОВНЯ###
;Свойство        Тип данных      Выдел. память   -f -t -l -c -ukensa  Краткое описание
;name            строка          любой текст     -  -  -  -  -        название уровня
;fglayout        имя файла       $200 байт       -  -  +  -  +        маппинги переднего плана
;bglayout        имя файла       $200 байт       -  -  +  -  +        маппинги заднего плана
;sslayout        имя файла       $1000 байт      -  +  +  -  +        маппинги спецэтапа
;chunks          имя файла       $A600 байт      -  +  +  -  +        чанки (тайлы 256х256)
;blocks          имя файла       $1800 байт      -  +  +  -  +        блоки (тайлы 16х16)
;tiles           имя файла       $20000 байт     -  +  +  -  +        тайлы 8х8
;ctiles          имя файла       $10*$2000 байт  -  +  +  +  +        циклические тайлы
;palette         имя файла       $100 байт       -  +  +  -  +        палитры
;cpalette        имя файла       $10*$80 байт    -  +  +  +  +        циклические палитры
;boundaries      имя файла       $12 байт        +  -  +  -  +        границы камеры уровня
;waterheight     имя файла       $2 байта        +  -  +  -  +        уровень воды
;ncarray         имя файла       $1000 байт      -  +  +  -  +        блоки поверхности
;rcarray         имя файла       $1000 байт      -  +  +  -  +        наклонные блоки поверхности
;angles          имя файла       $100 байт       -  +  +  -  +        углы поверхности
;collisions      имя файла       $300 байт       -  +  +  -  +        коллизии блоков
;objpos          имя файла       $C00 байт       -  +  +  -  +        расстановка объектов на уровне
;sonpos          имя файла       $4 байта        +  -  +  -  +        начальное положение Соника на уровне
;dplc            имя файла       $1000 байт      -  +  +  -  +        динамическая подгрузка тайлов Соника
;dplctiles       имя файла       $20000 байт     -  +  +  -  +        тайлы Соника
;include         строка          любой текст     -  -  -  -  -        переход в секцию

; ======== name ========
; Название уровня. Отображается в редакторе.
; В случае, если это свойство не задано, уровню будет присвоено имя "Уровень ####", где #### - его идентификатор.

; ======== fglayout ========
; Файл с маппингами переднего плана.

; ======== bglayout ========
; Файл с маппингами заднего плана.

; ======== sslayout ========
; Файл с маппингами специального этапа.

; ======== chunks ========
; Файл с чанками (тайлами 256х256).

; ======== blocks ========
; Файл с блоками (тайлами 16х16).

; ======== tiles ========
; Файл с тайлами 8х8.
; В памяти редактора создаётся два набора тайлов: начальный и конечный.
; В начальном хранятся те тайлы, что загружаются в начале уровня, в конечном - те, что в конце.
; Чтобы поместить их в конечный набор, необходимо к адресу видеопамяти (параметру -t) прибавить число $10000.
; Пример:
; tiles_1="имя файла" -t:$D000 - эти тайлы будут записаны в начальный набор
; tiles_2="имя файла" -t:$1D000 - а эти - в конечный

; ======== ctiles ========
; Файл с циклическими тайлами.
; Такие тайлы служат для создания эффекта движения. Типичный пример - цветок-подсолнух с вращающимися лепестками в GHZ.
; Свойство ctiles должно обязательно иметь параметр -c.

; ======== palette ========
; Файл с палитрами.
; Поддерживаются как надводные, так и подводные палитры. Вторые располагаются в памяти по адресу $80.
; Пример:
; palette_1="имя файла" -t:$20 - эти палитры будут загружены в основной (надводный) набор
; palette_2="имя файла" -t:$A0 - а эти - в подводный

; ======== cpalette ========
; Файл с циклическими палитрами.
; Свойство cpalette должно обязательно иметь параметр -c.

; ======== boundaries ========
; Границы камеры уровня.
; Если это свойство не задать, режим редактирования "Границы уровня" будет недоступен.

; ======== waterheight ========
; Уровень воды.
; Если это свойство не задать, режим редактирования "Уровень воды" будет недоступен.

; ======== ncarray ========
; Файл с блоками поверхности.

; ======== rcarray ========
; Файл с наклонными блоками поверхности.
; Редактором не используется.

; ======== angles ========
; Файл с углами поверхности.
; Редактором не используется.

; ======== collisions ========
; Файл соответствия блоков поверхности блокам 16x16.

; ======== objpos ========
; Файл расстановки объектов на уровне.

; ======== sonpos ========
; Файл, устанавливающий начальное положение Соника на уровне.

; ========include ========
; Переход в другую секцию (с последующим возвращением).
; Не пытайтесь зациклить секцию, ничего у вас не выйдет ;-)

; ######## Имя файла ########
; Синтаксис:
; имя файла -п1 -п2 -п3
; имя файла - это путь к файлу, который необходимо открыть.
; Осторожно: если в имени файла содержится пробел, его следует заключить в двойные кавычки.
; -п1, -п2, -п3 - параметры (отделяются друг от друга пробелом).

; ======== Параметры ========
;-f - указывает редактору, с какого места начать чтение файла.
; Если параметр не задан, чтение начнётся с самого начала.
; Синтаксис: -f:<смещение, в байтах>
;
;-t - указывает редактору, в какую часть выделяемой памяти следует вписать содержимое файла.
; Если параметр не задан, файл будет вписан в начало памяти
; Синтаксис: -t:<адрес, в байтах>
;
;-l - размер считываемых данных.
; Если параметр не задан, будет считан весь файл.
; Синтаксис: -l:<размер данных, в байтах>
;
;-c - параметр, описывающий цикл.
; Синтаксис: -c:<маска>,<шаг цикла>
; Маска - запись, состоящая из единиц и нулей, сообщающая программе о том, какие тайлы/цвета следует задействовать в цикле.
; Пример: ctiles="имя файла" -t:$2400 -l:$180 -c:1100101
; В этом примере циклически будут изменяться первый, второй, пятый и седьмой тайлы, начиная со $120 тайла ($2400/$20).
; Длина цикла в этом примере - четыре тайла. Размер цикла - 4*$20=$80 байт. Тогда циклов будет всего $180/$80=3.
; Шаг - задаёт шаг цикла (в тайлах/ячейках). Можно не указывать, тогда шагом по умолчанию будет вся длина цикла.

; ======== Параметры сжатия ========
; Следующие параметры задают алгоритм сжатия.
;-u - несжатый файл, задаётся по умолчанию
;-k - Kosinski
;-e - Enigma
;-n - Nemesis
;-s - Saxman
;-a - asm-файл. Парсер считывает команды dc.b, dc.w, dc.l, even и преобразует их в бинарный код.

